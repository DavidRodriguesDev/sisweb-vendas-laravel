services:
  nginx:
    image: nginx:alpine
    container_name: sales_nginx
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - sales_network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sales_php
    volumes:
      - ./:/var/www/html
    networks:
      - sales_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql:
    image: mysql:8.0
    container_name: sales_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 12345678910
      MYSQL_DATABASE: sales_system
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sales_network

  npm:
    image: node:20-alpine
    container_name: sales_npm
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    networks:
      - sales_network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

networks:
  sales_network:
    driver: bridge

volumes:
  mysql_data: